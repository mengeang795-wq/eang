<!DOCTYPE html>

    <style>

        }

            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #d32f2f;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #111;
            color: white;
            margin-top: 30px;
        }

        @media(max-width: 700px) {

</head>
